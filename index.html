<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Dashboard</title>
    <link rel="stylesheet" href="toDoList.css">
</head>
<body>

    <div class="container">

        <h1>To-Do List</h1>

        <div class="input-section">
            <input type="text" id="inputTask" placeholder="Enter a task">
            <button class="addWork">Add Task</button>
        </div>

        <!-- Dashboard -->
        <div class="dashboard">
            <div class="card">
                <h3>Total Tasks</h3>
                <p id="totalTasks">0</p>
            </div>

            <div class="card">
                <h3>Completed</h3>
                <p id="completedTasks">0</p>
            </div>

            <div class="card">
                <h3>Pending</h3>
                <p id="pendingTasks">0</p>
            </div>
        </div>

        <h2 id="compliment">Start adding tasks</h2>

        <div id="taskContainer"></div>

    </div>

    <script src="toDo.js"></script>
</body>
</html>
